      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.01 0 0 0 0 0.03 0 0 0 0 0.04 0 0 0 0.5 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="shadow"/>
      <feBlend mode="normal" in="SourceGraphic" in2="shadow" result="shape"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="196" fill="url(#background)"/>
