<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DopeCart Logo</title>
  <desc id="desc">A fast rounded shopping cart icon with lime motion lines and a coral basket on a dark rounded square.</desc>
  <defs>
    <linearGradient id="background" x1="152" y1="84" x2="878" y2="940" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17202A"/>
      <stop offset="0.55" stop-color="#070B11"/>
      <stop offset="1" stop-color="#111B19"/>
    </linearGradient>
    <linearGradient id="lime" x1="140" y1="214" x2="473" y2="792" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D4DA53"/>
      <stop offset="0.48" stop-color="#BBD447"/>
      <stop offset="1" stop-color="#82BE45"/>
    </linearGradient>
    <linearGradient id="coral" x1="437" y1="310" x2="799" y2="544" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F18966"/>
      <stop offset="1" stop-color="#D55E52"/>
    </linearGradient>
    <filter id="markShadow" x="69" y="137" width="812" height="732" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
